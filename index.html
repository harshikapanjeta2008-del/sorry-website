<!DOCTYPE html>
<html>
<head>
<title>For Taniya 💗</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
<style>

body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: linear-gradient(135deg,#fcd6ff,#fff4d6,#ffd6ec);
  font-family: 'Quicksand', sans-serif;
  overflow:hidden;
}

/* Floating hearts */
.heart{
  position:absolute;
  font-size:20px;
  animation: float 8s linear infinite;
  opacity:0.5;
}

@keyframes float{
  0%{transform:translateY(100vh) scale(0.8);}
  100%{transform:translateY(-10vh) scale(1.2);}
}

/* Card */
.card{
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(10px);
  width:340px;
  padding:30px;
  border-radius:30px;
  box-shadow: 0 20px 40px rgba(255,182,193,0.4);
  text-align:center;
  animation: fadeIn 1s ease-in-out;
}

h2{
  color:#7b4ca0;
  font-weight:600;
}

p{
  color:#555;
  font-size:15px;
}

/* Button */
button{
  margin-top:20px;
  padding:12px 22px;
  border:none;
  border-radius:30px;
  background: linear-gradient(45deg,#ff9ecf,#ff6fb5);
  color:white;
  font-weight:600;
  cursor:pointer;
  box-shadow:0 5px 15px rgba(255,105,180,0.4);
  transition:0.3s;
}

button:hover{
  transform: scale(1.05);
}

.page{
  display:none;
  animation: fadeIn 0.6s ease-in-out;
}

.active{
  display:block;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(10px);}
  to{opacity:1; transform:translateY(0);}
}

.final{
  font-size:22px;
  color:#ff4fa3;
  font-weight:600;
}

/* Heart burst animation */
.burst{
  position:absolute;
  font-size:18px;
  animation: burst 1.2s ease-out forwards;
}

@keyframes burst{
  0%{opacity:1; transform:translate(0,0);}
  100%{opacity:0; transform:translate(var(--x), var(--y));}
}

.cat{
  width:90px;
  margin:10px auto;
}

</style>
</head>

<body>

<!-- Floating hearts -->
<div class="heart" style="left:10%;">💗</div>
<div class="heart" style="left:25%; animation-delay:2s;">💜</div>
<div class="heart" style="left:50%; animation-delay:4s;">💖</div>
<div class="heart" style="left:75%; animation-delay:1s;">💕</div>
<div class="heart" style="left:90%; animation-delay:3s;">💞</div>

<div class="card" id="card">

<div class="page active" id="page1">
<h2>Taniya...</h2>
<p>I know I hurt you 🥺</p>
<img class="cat" src="https://media.giphy.com/media/JIX9t2j0ZTN9S/giphy.gif">
<button onclick="nextPage()">Next →</button>
</div>

<div class="page" id="page2">
<h2>Little things I want to tell you...</h2>
<p>You mean so much to me 💗<br>I never wanted to hurt you.</p>
<button onclick="nextPage()">Next →</button>
</div>

<div class="page" id="page3">
<h2>From my heart...</h2>
<p>I truly regret what happened.</p>
<button onclick="nextPage()">Tap to see my heart 💌</button>
</div>

<div class="page" id="page4">
<p class="final">I'm Really Sorry Taniya 💕</p>
<p>Please forgive me... I promise I'll do better 🥹</p>
</div>

</div>

<script>
let current = 1;
function nextPage(){
  document.getElementById("page"+current).classList.remove("active");
  current++;
  document.getElementById("page"+current).classList.add("active");

  if(current === 4){
    createBurst();
  }
}

function createBurst(){
  const card = document.getElementById("card");
  for(let i=0;i<20;i++){
    const heart = document.createElement("div");
    heart.classList.add("burst");
    heart.innerHTML = "💖";
    heart.style.left = "50%";
    heart.style.top = "50%";
    heart.style.setProperty('--x', (Math.random()*200-100)+"px");
    heart.style.setProperty('--y', (Math.random()*200-100)+"px");
    card.appendChild(heart);
    setTimeout(()=>heart.remove(),1200);
  }
}
</script>

</body>
</html>
