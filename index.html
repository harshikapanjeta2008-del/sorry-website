<!DOCTYPE html>
<html>
<head>
<title>I'm Sorry 💗</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: linear-gradient(135deg,#ffe6f7,#fff1d6);
  font-family: cursive;
  overflow:hidden;
}

.heart{
  position:absolute;
  font-size:22px;
  animation:float 6s linear infinite;
  opacity:0.7;
}
@keyframes float{
  0%{transform:translateY(100vh);}
  100%{transform:translateY(-10vh);}
}

.card{
  background:white;
  width:320px;
  padding:25px;
  border-radius:25px;
  box-shadow:0 15px 30px rgba(0,0,0,0.15);
  text-align:center;
}

button{
  margin-top:15px;
  padding:10px 20px;
  border:none;
  border-radius:20px;
  background:#ff9ecf;
  color:white;
  cursor:pointer;
}

.page{ display:none; }
.active{ display:block; }
</style>
</head>

<body>

<div class="heart" style="left:10%;">💗</div>
<div class="heart" style="left:30%; animation-delay:2s;">💜</div>
<div class="heart" style="left:60%; animation-delay:4s;">💖</div>
<div class="heart" style="left:80%; animation-delay:1s;">💕</div>

<div class="card">

<div class="page active" id="page1">
<h2>I know I hurt you...</h2>
<p>And I've been feeling really bad about it 🥺</p>
<button onclick="nextPage()">Next →</button>
</div>

<div class="page" id="page2">
<h2>Little things I want to tell you...</h2>
<p>I messed up… and I’m really sorry 💗</p>
<button onclick="nextPage()">Next →</button>
</div>

<div class="page" id="page3">
<h2>From my heart...</h2>
<p>You mean a lot to me ❤️</p>
<button onclick="nextPage()">Tap to see message 💌</button>
</div>

<div class="page" id="page4">
<h1>I'm Sorry 💕</h1>
<p>Please forgive me... I promise I'll do better 🥹</p>
</div>

</div>

<script>
let current = 1;
function nextPage(){
  document.getElementById("page"+current).classList.remove("active");
  current++;
  document.getElementById("page"+current).classList.add("active");
}
</script>

</body>
</html>
